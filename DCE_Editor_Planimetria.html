<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCE — Editor Planimetria</title>
<style>
:root {
  --bg: #0f0f0f;
  --bg2: #161616;
  --bg3: #1e1e1e;
  --bg4: #252525;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #e8e6e0;
  --text2: #9a9890;
  --text3: #5a5856;
  --accent: #d4883a;
  --accent-bg: rgba(212,136,58,0.12);
  --radius: 6px;
  --font: 'Helvetica Neue', Arial, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* TOOLBAR */
.toolbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 8px 12px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }
.toolbar-section { display: flex; align-items: center; gap: 6px; padding-right: 10px; border-right: 1px solid var(--border); }
.toolbar-section:last-child { border-right: none; }
.btn { padding: 5px 10px; border-radius: var(--radius); font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border2); background: var(--bg3); color: var(--text2); transition: all 0.15s; font-family: var(--font); }
.btn:hover { background: var(--bg4); color: var(--text); }
.btn.active { background: var(--accent-bg); color: var(--accent); border-color: rgba(212,136,58,0.3); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { opacity: 0.85; }
.btn-danger { background: rgba(181,74,74,0.15); color: #e06060; border-color: rgba(181,74,74,0.25); }
label { font-size: 11px; color: var(--text3); }
input[type="color"] { width: 28px; height: 24px; border: 1px solid var(--border2); border-radius: 4px; cursor: pointer; background: none; padding: 1px; }
input[type="text"], input[type="number"] { background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius); padding: 4px 8px; color: var(--text); font-size: 12px; font-family: var(--font); outline: none; }
input[type="text"]:focus, input[type="number"]:focus { border-color: var(--accent); }
input[type="number"] { width: 52px; }
select { background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius); padding: 4px 8px; color: var(--text2); font-size: 12px; font-family: var(--font); outline: none; cursor: pointer; }

/* MAIN AREA */
.main { display: flex; flex: 1; overflow: hidden; }

/* CANVAS AREA */
.canvas-wrap { flex: 1; overflow: auto; background: #0a0a0a; position: relative; cursor: default; }
#canvas { position: relative; background: #111; border: 1px solid var(--border); margin: 24px; }

/* SIDE PANEL */
.side { width: 220px; flex-shrink: 0; background: var(--bg2); border-left: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }
.side-section { padding: 12px; border-bottom: 1px solid var(--border); }
.side-title { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
.prop-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; gap: 6px; }
.prop-label { font-size: 11px; color: var(--text2); }
.prop-val { font-size: 12px; color: var(--text); }

/* ZONE LIST */
.zone-list { flex: 1; overflow-y: auto; padding: 8px; }
.zone-item { display: flex; align-items: center; gap: 6px; padding: 6px 8px; border-radius: var(--radius); cursor: pointer; margin-bottom: 2px; border: 1px solid transparent; }
.zone-item:hover { background: var(--bg3); }
.zone-item.active { background: var(--accent-bg); border-color: rgba(212,136,58,0.2); }
.zone-color-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.zone-name { font-size: 12px; color: var(--text2); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.zone-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; padding: 0 2px; line-height: 1; }
.zone-del:hover { color: #e06060; }

/* STATUS BAR */
.statusbar { background: var(--bg2); border-top: 1px solid var(--border); padding: 4px 12px; font-size: 11px; color: var(--text3); display: flex; gap: 16px; flex-shrink: 0; }

/* ZONE ON CANVAS */
.zone { position: absolute; border: 1.5px solid; cursor: move; user-select: none; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; transition: box-shadow 0.1s; }
.zone.selected { box-shadow: 0 0 0 2px var(--accent); }
.zone-label { font-size: 11px; font-weight: 600; text-align: center; padding: 0 4px; line-height: 1.3; word-break: break-word; pointer-events: none; }
.zone-sub { font-size: 9px; text-align: center; padding: 0 4px; opacity: 0.7; pointer-events: none; }

/* RESIZE HANDLE */
.resize-handle { position: absolute; width: 10px; height: 10px; background: var(--accent); border-radius: 2px; cursor: se-resize; bottom: -4px; right: -4px; z-index: 10; }

/* GRID */
.grid-lines { position: absolute; top: 0; left: 0; pointer-events: none; }

/* PERIMETRO OFFICINA (fisso) -->
.perimetro { position: absolute; border: 2px solid #555; border-radius: 4px; pointer-events: none; }
</style>
</head>
<body>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="toolbar-section">
    <span style="font-size:12px;font-weight:600;color:var(--accent)">DCE</span>
    <span style="font-size:11px;color:var(--text3)">Editor Planimetria</span>
  </div>

  <div class="toolbar-section">
    <label>Dimensioni officina</label>
    <input type="number" id="w-officina" value="800" min="400" max="2000" onchange="resizeOfficina()"> ×
    <input type="number" id="h-officina" value="600" min="300" max="1500" onchange="resizeOfficina()">
    <label>px</label>
  </div>

  <div class="toolbar-section">
    <label>Griglia</label>
    <input type="number" id="grid-size" value="20" min="5" max="100" style="width:44px" onchange="updateGrid()">
    <label>px</label>
    <button class="btn" id="btn-grid" onclick="toggleGrid()">Griglia ON</button>
  </div>

  <div class="toolbar-section">
    <label>Nuova zona:</label>
    <input type="text" id="new-name" placeholder="Nome zona" style="width:110px">
    <input type="color" id="new-color" value="#eeedfe" title="Colore zona">
    <select id="new-cat">
      <option value="stoccaggio">Stoccaggio</option>
      <option value="produzione">Produzione</option>
      <option value="sicurezza">Sicurezza</option>
      <option value="transito">Transito</option>
      <option value="servizi">Servizi</option>
      <option value="macchinario">Macchinario</option>
      <option value="accesso">Accesso</option>
      <option value="ufficio">Ufficio</option>
      <option value="altro">Altro</option>
    </select>
    <button class="btn btn-primary" onclick="addZona()">+ Aggiungi</button>
  </div>

  <div class="toolbar-section">
    <button class="btn" onclick="exportSVG()">Esporta SVG</button>
    <button class="btn" onclick="exportJSON()">Esporta JSON</button>
    <button class="btn btn-primary" onclick="saveLayout()">💾 Salva</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- CANVAS -->
  <div class="canvas-wrap" id="canvas-wrap">
    <div id="canvas">
      <!-- Grid SVG -->
      <svg class="grid-lines" id="grid-svg" style="display:none"></svg>
      <!-- Perimetro officina -->
      <div class="perimetro" id="perimetro"></div>
      <!-- Zone aggiunte dinamicamente -->
    </div>
  </div>

  <!-- SIDE PANEL -->
  <div class="side">

    <!-- PROPRIETÀ ZONA SELEZIONATA -->
    <div class="side-section" id="props-section">
      <div class="side-title">Proprietà zona</div>
      <div id="no-selection" style="color:var(--text3);font-size:12px">Nessuna zona selezionata.<br>Clicca su una zona o aggiungine una nuova.</div>
      <div id="props-form" style="display:none">
        <div class="prop-row">
          <label class="prop-label">Nome</label>
          <input type="text" id="prop-name" style="width:120px" onchange="updateProp('name',this.value)">
        </div>
        <div class="prop-row">
          <label class="prop-label">Categoria</label>
          <select id="prop-cat" style="width:120px" onchange="updateProp('cat',this.value)">
            <option value="stoccaggio">Stoccaggio</option>
            <option value="produzione">Produzione</option>
            <option value="sicurezza">Sicurezza</option>
            <option value="transito">Transito</option>
            <option value="servizi">Servizi</option>
            <option value="macchinario">Macchinario</option>
            <option value="accesso">Accesso</option>
            <option value="ufficio">Ufficio</option>
            <option value="altro">Altro</option>
          </select>
        </div>
        <div class="prop-row">
          <label class="prop-label">Colore</label>
          <input type="color" id="prop-color" onchange="updateProp('color',this.value)">
        </div>
        <div class="prop-row">
          <label class="prop-label">Bordo</label>
          <select id="prop-border" onchange="updateProp('border',this.value)">
            <option value="solid">Continuo</option>
            <option value="dashed">Tratteggiato</option>
            <option value="dotted">Punteggiato</option>
          </select>
        </div>
        <div class="prop-row">
          <label class="prop-label">Note</label>
        </div>
        <textarea id="prop-note" rows="3" style="width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:6px;color:var(--text);font-family:var(--font);font-size:12px;resize:vertical" onchange="updateProp('note',this.value)"></textarea>
        <div class="prop-row" style="margin-top:8px">
          <label class="prop-label">X</label>
          <input type="number" id="prop-x" style="width:60px" onchange="updatePropPos('x',this.value)">
          <label class="prop-label">Y</label>
          <input type="number" id="prop-y" style="width:60px" onchange="updatePropPos('y',this.value)">
        </div>
        <div class="prop-row">
          <label class="prop-label">W</label>
          <input type="number" id="prop-w" style="width:60px" onchange="updatePropPos('w',this.value)">
          <label class="prop-label">H</label>
          <input type="number" id="prop-h" style="width:60px" onchange="updatePropPos('h',this.value)">
        </div>
        <div style="margin-top:8px">
          <label class="prop-label" style="display:block;margin-bottom:4px">Superficie (m²)</label>
          <input type="number" id="prop-mq" style="width:80px" step="0.01" placeholder="es. 4.61" onchange="updateProp('mq',this.value)">
        </div>
        <button class="btn btn-danger" style="width:100%;margin-top:12px" onclick="deleteSelected()">Elimina zona</button>
      </div>
    </div>

    <!-- LISTA ZONE -->
    <div class="side-section">
      <div class="side-title">Zone (<span id="zone-count">0</span>)</div>
    </div>
    <div class="zone-list" id="zone-list"></div>

  </div>
</div>

<!-- STATUS BAR -->
<div class="statusbar">
  <span id="status-coords">X: 0  Y: 0</span>
  <span id="status-selected">Nessuna selezione</span>
  <span id="status-count">0 zone</span>
  <span style="margin-left:auto">DCE Carpenteria Metallica — Editor Planimetria v1.0</span>
</div>

<script>
let zones = [];
let selected = null;
let gridOn = true;
let gridSize = 20;
let dragging = false;
let resizing = false;
let dragOffX = 0, dragOffY = 0;
let resizeZone = null;
let resizeStartX = 0, resizeStartY = 0, resizeStartW = 0, resizeStartH = 0;

const canvas = document.getElementById('canvas');
const perimetro = document.getElementById('perimetro');

// Init
function init() {
  resizeOfficina();
  drawGrid();
  loadFromStorage();
  updateZoneList();

  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('mouseup', onMouseUp);
  document.addEventListener('mouseup', onMouseUp);
  document.addEventListener('keydown', onKeyDown);
}

function resizeOfficina() {
  const w = parseInt(document.getElementById('w-officina').value);
  const h = parseInt(document.getElementById('h-officina').value);
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  perimetro.style.left = '0px';
  perimetro.style.top = '0px';
  perimetro.style.width = w + 'px';
  perimetro.style.height = h + 'px';
  drawGrid();
}

function drawGrid() {
  const w = parseInt(document.getElementById('w-officina').value);
  const h = parseInt(document.getElementById('h-officina').value);
  const svg = document.getElementById('grid-svg');
  svg.setAttribute('width', w);
  svg.setAttribute('height', h);
  svg.style.width = w + 'px';
  svg.style.height = h + 'px';
  gridSize = parseInt(document.getElementById('grid-size').value) || 20;

  let lines = '';
  for (let x = 0; x <= w; x += gridSize) {
    lines += `<line x1="${x}" y1="0" x2="${x}" y2="${h}" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>`;
  }
  for (let y = 0; y <= h; y += gridSize) {
    lines += `<line x1="0" y1="${y}" x2="${w}" y2="${y}" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>`;
  }
  // Every 5 lines slightly brighter
  for (let x = 0; x <= w; x += gridSize*5) {
    lines += `<line x1="${x}" y1="0" x2="${x}" y2="${h}" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>`;
  }
  for (let y = 0; y <= h; y += gridSize*5) {
    lines += `<line x1="0" y1="${y}" x2="${w}" y2="${y}" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>`;
  }
  svg.innerHTML = lines;
}

function updateGrid() { drawGrid(); }

function toggleGrid() {
  gridOn = !gridOn;
  document.getElementById('grid-svg').style.display = gridOn ? 'block' : 'none';
  document.getElementById('btn-grid').textContent = gridOn ? 'Griglia ON' : 'Griglia OFF';
  document.getElementById('btn-grid').classList.toggle('active', gridOn);
}

function snap(v) {
  if (!gridOn) return v;
  return Math.round(v / gridSize) * gridSize;
}

// Add new zone
function addZona() {
  const name = document.getElementById('new-name').value.trim() || 'Zona ' + (zones.length + 1);
  const color = document.getElementById('new-color').value;
  const cat = document.getElementById('new-cat').value;

  const z = {
    id: 'z' + Date.now(),
    name, color, cat,
    x: snap(40), y: snap(40),
    w: snap(160), h: snap(100),
    border: 'solid',
    note: '',
    mq: ''
  };
  zones.push(z);
  renderZone(z);
  selectZone(z.id);
  updateZoneList();
  updateStatus();
  document.getElementById('new-name').value = '';
}

function renderZone(z) {
  // Remove existing
  const existing = document.getElementById(z.id);
  if (existing) existing.remove();

  const el = document.createElement('div');
  el.className = 'zone';
  el.id = z.id;

  const rgb = hexToRgb(z.color);
  const borderColor = darken(z.color, 0.4);
  const textColor = isDark(z.color) ? '#fff' : darken(z.color, 0.6);

  el.style.cssText = `
    left:${z.x}px; top:${z.y}px;
    width:${z.w}px; height:${z.h}px;
    background:${z.color}cc;
    border:1.5px ${z.border} ${borderColor};
    border-radius:4px;
  `;

  const label = document.createElement('div');
  label.className = 'zone-label';
  label.style.color = textColor;
  label.textContent = z.name;

  const sub = document.createElement('div');
  sub.className = 'zone-sub';
  sub.style.color = textColor;
  sub.textContent = z.mq ? z.mq + ' m²' : z.cat;

  el.appendChild(label);
  el.appendChild(sub);

  // Resize handle
  const rh = document.createElement('div');
  rh.className = 'resize-handle';
  rh.addEventListener('mousedown', (e) => startResize(e, z.id));
  el.appendChild(rh);

  el.addEventListener('mousedown', (e) => {
    if (e.target.classList.contains('resize-handle')) return;
    startDrag(e, z.id);
  });

  canvas.appendChild(el);
}

function rerenderZone(id) {
  const z = zones.find(z => z.id === id);
  if (z) renderZone(z);
  if (selected === id) {
    document.getElementById(id)?.classList.add('selected');
  }
}

function selectZone(id) {
  if (selected) {
    document.getElementById(selected)?.classList.remove('selected');
  }
  selected = id;
  const z = zones.find(z => z.id === id);
  if (!z) {
    document.getElementById('no-selection').style.display = 'block';
    document.getElementById('props-form').style.display = 'none';
    document.getElementById('status-selected').textContent = 'Nessuna selezione';
    return;
  }
  document.getElementById(id)?.classList.add('selected');
  document.getElementById('no-selection').style.display = 'none';
  document.getElementById('props-form').style.display = 'block';
  document.getElementById('prop-name').value = z.name;
  document.getElementById('prop-cat').value = z.cat;
  document.getElementById('prop-color').value = z.color;
  document.getElementById('prop-border').value = z.border;
  document.getElementById('prop-note').value = z.note;
  document.getElementById('prop-x').value = z.x;
  document.getElementById('prop-y').value = z.y;
  document.getElementById('prop-w').value = z.w;
  document.getElementById('prop-h').value = z.h;
  document.getElementById('prop-mq').value = z.mq;
  document.getElementById('status-selected').textContent = `Selezionata: ${z.name}`;
  updateZoneList();
}

function updateProp(key, val) {
  if (!selected) return;
  const z = zones.find(z => z.id === selected);
  if (!z) return;
  z[key] = val;
  rerenderZone(selected);
  updateZoneList();
}

function updatePropPos(key, val) {
  if (!selected) return;
  const z = zones.find(z => z.id === selected);
  if (!z) return;
  const v = snap(parseInt(val) || 0);
  if (key === 'x') z.x = v;
  if (key === 'y') z.y = v;
  if (key === 'w') z.w = Math.max(40, v);
  if (key === 'h') z.h = Math.max(30, v);
  rerenderZone(selected);
}

function deleteSelected() {
  if (!selected) return;
  if (!confirm('Eliminare questa zona?')) return;
  document.getElementById(selected)?.remove();
  zones = zones.filter(z => z.id !== selected);
  selected = null;
  document.getElementById('no-selection').style.display = 'block';
  document.getElementById('props-form').style.display = 'none';
  updateZoneList();
  updateStatus();
}

// DRAG
function startDrag(e, id) {
  e.preventDefault();
  selectZone(id);
  const z = zones.find(z => z.id === id);
  if (!z) return;
  dragging = true;
  const rect = canvas.getBoundingClientRect();
  dragOffX = e.clientX - rect.left - z.x;
  dragOffY = e.clientY - rect.top - z.y;
}

function onMouseMove(e) {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  document.getElementById('status-coords').textContent = `X: ${Math.round(mx)}  Y: ${Math.round(my)}`;

  if (dragging && selected) {
    const z = zones.find(z => z.id === selected);
    if (!z) return;
    z.x = Math.max(0, snap(mx - dragOffX));
    z.y = Math.max(0, snap(my - dragOffY));
    const el = document.getElementById(selected);
    if (el) { el.style.left = z.x + 'px'; el.style.top = z.y + 'px'; }
    document.getElementById('prop-x').value = z.x;
    document.getElementById('prop-y').value = z.y;
  }

  if (resizing && resizeZone) {
    const z = zones.find(z => z.id === resizeZone);
    if (!z) return;
    const dw = e.clientX - resizeStartX;
    const dh = e.clientY - resizeStartY;
    z.w = Math.max(40, snap(resizeStartW + dw));
    z.h = Math.max(30, snap(resizeStartH + dh));
    const el = document.getElementById(resizeZone);
    if (el) { el.style.width = z.w + 'px'; el.style.height = z.h + 'px'; }
    document.getElementById('prop-w').value = z.w;
    document.getElementById('prop-h').value = z.h;
  }
}

function onMouseUp() {
  dragging = false;
  resizing = false;
  resizeZone = null;
}

function startResize(e, id) {
  e.preventDefault();
  e.stopPropagation();
  resizing = true;
  resizeZone = id;
  const z = zones.find(z => z.id === id);
  resizeStartX = e.clientX;
  resizeStartY = e.clientY;
  resizeStartW = z.w;
  resizeStartH = z.h;
}

function onKeyDown(e) {
  if (!selected) return;
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
      deleteSelected();
    }
  }
  const z = zones.find(z => z.id === selected);
  if (!z) return;
  const step = e.shiftKey ? gridSize * 5 : gridSize;
  if (e.key === 'ArrowLeft')  { z.x = Math.max(0, z.x - step); }
  if (e.key === 'ArrowRight') { z.x += step; }
  if (e.key === 'ArrowUp')    { z.y = Math.max(0, z.y - step); }
  if (e.key === 'ArrowDown')  { z.y += step; }
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) {
    e.preventDefault();
    const el = document.getElementById(selected);
    if (el) { el.style.left = z.x + 'px'; el.style.top = z.y + 'px'; }
    document.getElementById('prop-x').value = z.x;
    document.getElementById('prop-y').value = z.y;
  }
}

// ZONE LIST
function updateZoneList() {
  const list = document.getElementById('zone-list');
  document.getElementById('zone-count').textContent = zones.length;
  document.getElementById('status-count').textContent = zones.length + ' zone';
  if (!zones.length) {
    list.innerHTML = '<div style="color:var(--text3);font-size:12px;padding:8px">Nessuna zona. Aggiungine una dalla toolbar.</div>';
    return;
  }
  list.innerHTML = zones.map(z => `
    <div class="zone-item${selected === z.id ? ' active' : ''}" onclick="selectZone('${z.id}')">
      <div class="zone-color-dot" style="background:${z.color};border:1px solid ${darken(z.color,0.4)}"></div>
      <span class="zone-name">${z.name}</span>
      <button class="zone-del" onclick="event.stopPropagation();deleteZone('${z.id}')">×</button>
    </div>
  `).join('');
}

function deleteZone(id) {
  document.getElementById(id)?.remove();
  zones = zones.filter(z => z.id !== id);
  if (selected === id) {
    selected = null;
    document.getElementById('no-selection').style.display = 'block';
    document.getElementById('props-form').style.display = 'none';
  }
  updateZoneList();
  updateStatus();
}

function updateStatus() {
  document.getElementById('status-count').textContent = zones.length + ' zone';
  document.getElementById('zone-count').textContent = zones.length;
}

// SAVE / LOAD
function saveLayout() {
  const data = {
    officina: {
      w: document.getElementById('w-officina').value,
      h: document.getElementById('h-officina').value
    },
    zones
  };
  localStorage.setItem('dce-planimetria', JSON.stringify(data));
  alert('Layout salvato!');
}

function loadFromStorage() {
  try {
    const saved = JSON.parse(localStorage.getItem('dce-planimetria') || '{}');
    if (saved.officina) {
      document.getElementById('w-officina').value = saved.officina.w;
      document.getElementById('h-officina').value = saved.officina.h;
      resizeOfficina();
    }
    if (saved.zones) {
      zones = saved.zones;
      zones.forEach(z => renderZone(z));
      updateZoneList();
      updateStatus();
    }
  } catch(e) {}
}

// EXPORT SVG
function exportSVG() {
  const w = parseInt(document.getElementById('w-officina').value);
  const h = parseInt(document.getElementById('h-officina').value);
  let svg = `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">\n`;
  svg += `<rect width="${w}" height="${h}" fill="#1a1a1a" stroke="#555" stroke-width="2" rx="4"/>\n`;
  zones.forEach(z => {
    const border = darken(z.color, 0.4);
    const textCol = isDark(z.color) ? '#fff' : darken(z.color, 0.6);
    const dash = z.border === 'dashed' ? ' stroke-dasharray="6 3"' : z.border === 'dotted' ? ' stroke-dasharray="2 3"' : '';
    svg += `<rect x="${z.x}" y="${z.y}" width="${z.w}" height="${z.h}" fill="${z.color}cc" stroke="${border}" stroke-width="1.5" rx="4"${dash}/>\n`;
    svg += `<text x="${z.x + z.w/2}" y="${z.y + z.h/2 - 6}" text-anchor="middle" font-size="12" font-weight="600" fill="${textCol}" font-family="Arial">${z.name}</text>\n`;
    if (z.mq) svg += `<text x="${z.x + z.w/2}" y="${z.y + z.h/2 + 10}" text-anchor="middle" font-size="10" fill="${textCol}" font-family="Arial" opacity="0.7">${z.mq} m²</text>\n`;
  });
  svg += '</svg>';
  const blob = new Blob([svg], {type:'image/svg+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'DCE_Planimetria.svg';
  a.click();
}

// EXPORT JSON
function exportJSON() {
  const data = { officina: { w: document.getElementById('w-officina').value, h: document.getElementById('h-officina').value }, zones };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'DCE_Planimetria.json';
  a.click();
}

// COLOR UTILS
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function darken(hex, amount) {
  const {r,g,b} = hexToRgb(hex);
  return `rgb(${Math.max(0,Math.round(r*(1-amount)))},${Math.max(0,Math.round(g*(1-amount)))},${Math.max(0,Math.round(b*(1-amount)))})`;
}

function isDark(hex) {
  const {r,g,b} = hexToRgb(hex);
  return (0.299*r + 0.587*g + 0.114*b) < 128;
}

// CANVAS CLICK (deselect)
canvas.addEventListener('mousedown', (e) => {
  if (e.target === canvas || e.target === document.getElementById('grid-svg') || e.target === perimetro) {
    if (selected) {
      document.getElementById(selected)?.classList.remove('selected');
      selected = null;
      document.getElementById('no-selection').style.display = 'block';
      document.getElementById('props-form').style.display = 'none';
      document.getElementById('status-selected').textContent = 'Nessuna selezione';
      updateZoneList();
    }
  }
});

init();
</script>
